[monitoring]

prometheus_url = http://prometheus:9090

cpu_query = 100 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100

memory_query = 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))

disk_query = 100 - ((node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100)

network_rx_query = rate(node_network_receive_bytes_total[1m])

network_tx_query = rate(node_network_transmit_bytes_total[1m])

slack_webhook = YOUR_SLACK_WEBHOOK_URL